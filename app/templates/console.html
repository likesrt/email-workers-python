<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Workers Console</title>
  <style>__STYLE__</style>
  /* <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"></script> */
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="page-shell">
    <div class="wrap">
      <section class="hero">
        <div class="hero-left">
          <div class="hero-auth">
            <label for="tokenInput" class="auth-label">Token</label>
            <input id="tokenInput" type="password" placeholder="输入 API_TOKEN" autocomplete="off" />
            <div class="auth-btns">
              <button id="saveTokenBtn" class="primary" type="button">保存</button>
              <button id="verifyTokenBtn" class="ghost" type="button">验证</button>
              <button id="clearTokenBtn" class="ghost" type="button">清空</button>
            </div>
          </div>
        </div>
        <div class="hero-right">
          <div style="display:flex; justify-content: space-between; align-items: flex-start;">
            <span class="eyebrow">FASTAPI MAIL CONSOLE</span>
            <button id="themeToggleBtn" class="ghost" type="button" style="padding: 0.5rem; border-radius: 50%;" title="切换亮/暗模式"></button>
          </div>
          <h1>邮件收件箱</h1>
          <div class="hero-actions">
            <a class="nav-link primary" href="/docs">API 文档</a>
            <a class="nav-link secondary" href="/openapi">Swagger</a>
          </div>
        </div>
      </section>

      <div class="layout-grid">
        <section class="panel section-panel filter-panel">
          <div class="filter-bar">
            <div class="filter-field">
              <label for="rcptToInput">收件邮箱</label>
              <input id="rcptToInput" type="text" placeholder="留空查看全部" />
            </div>
            <button id="searchBtn" class="primary" type="button">查询</button>
            <button id="toggleAutoRefreshBtn" class="secondary" type="button">停止自动刷新</button>
            <button id="toggleFiltersBtn" class="ghost-btn" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="6" cy="6" r="1.5" fill="currentColor"/><circle cx="10" cy="12" r="1.5" fill="currentColor"/><circle cx="14" cy="18" r="1.5" fill="currentColor"/></svg>
              更多筛选
            </button>
          </div>
          <div class="filter-details" id="filterDetails" hidden>
            <div class="filter-body">
              <div class="filter-grid">
                <div class="field">
                  <label for="afterInput">开始时间</label>
                  <input id="afterInput" type="datetime-local" />
                </div>
                <div class="field">
                  <label for="beforeInput">结束时间</label>
                  <input id="beforeInput" type="datetime-local" />
                </div>
                <div class="field">
                  <label for="pageSizeSelect">每页</label>
                  <select id="pageSizeSelect">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                </div>
                <div class="field">
                  <label for="manualCleanupMinutesInput">手动清理(分钟)</label>
                  <input id="manualCleanupMinutesInput" type="number" min="1" value="10" />
                </div>
                <div class="field">
                  <label for="autoCleanupMinutesInput" style="display:flex; justify-content:space-between; align-items:center;">
                    自动清理(分钟)
                    <div class="status-bar inline-status" id="autoCleanupCell" data-active="0" style="padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;">
                      <span class="status-dot" style="width:6px; height:6px;"></span>
                      <span class="status-label" id="autoCleanupStatus">已停止</span>
                    </div>
                  </label>
                  <input id="autoCleanupMinutesInput" type="number" min="1" value="10" />
                </div>
                <div class="field">
                  <label for="autoRefreshSecondsInput">自动刷新(秒)</label>
                  <input id="autoRefreshSecondsInput" type="number" min="1" value="3" />
                </div>
              </div>
              <div class="filter-actions">
                <button id="toggleAutoCleanupBtn" class="secondary" type="button">开启自动清理</button>
                <button id="cleanupBtn" class="danger" type="button">手动清理</button>
                <button id="resetFiltersBtn" class="secondary" type="button">重置</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel section-panel" style="position:relative; z-index:1;">
          <div class="section-head">
            <div>
              <div style="display:flex; align-items:center; gap: 1rem; flex-wrap: wrap;">
                <h2>邮件列表</h2>
                <div class="status-bar inline-status" id="autoRefreshCell" data-active="1" style="padding: 4px 12px; border-radius: 20px;">
                  <span class="status-dot"></span>
                  <span class="status-label" id="autoRefreshStatus">自动刷新中 3s</span>
                </div>
              </div>
              <div class="section-note">点击邮件后将在新页面展示详细内容。</div>
            </div>
            <div class="section-tag">Inbox View</div>
          </div>

          <div class="pagination-bar" id="paginationTop">
            <button id="prevPageBtnTop" class="secondary" type="button">上一页</button>
            <button id="nextPageBtnTop" class="secondary" type="button">下一页</button>
            <span id="paginationInfoTop" class="pagination-pill">等待查询</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-time">收到时间</th>
                  <th class="col-to">收件邮箱</th>
                  <th class="col-from">发件邮箱</th>
                  <th class="col-subject">主题</th>
                  <th class="col-actions">操作</th>
                </tr>
              </thead>
              <tbody id="mailTableBody">
                <tr><td colspan="5" class="empty">暂无数据</td></tr>
              </tbody>
            </table>
          </div>

          <div class="pagination-bar" id="paginationBottom">
            <button id="prevPageBtn" class="secondary" type="button">上一页</button>
            <button id="nextPageBtn" class="secondary" type="button">下一页</button>
            <span id="paginationInfo" class="pagination-pill">等待查询</span>
          </div>
        </section>
      </div>
    </div>
  </div>


  <script>__SCRIPT__</script>
</body>
</html>
